<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match The Regex - CTF Challenge</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #00ff88;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .challenge-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #00ff88;
        }
        
        .regex-display {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff88;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 1.2em;
            border: 2px solid #00ff88;
        }
        
        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #00ff88;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            margin: 10px 0;
        }
        
        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 15px #00ff88;
        }
        
        button {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1em;
            min-height: 20px;
        }
        
        .success {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
        }
        
        .hint-btn {
            background: linear-gradient(45deg, #ffa500, #ff8c00);
            font-size: 0.9em;
            padding: 10px 20px;
        }
        
        .pattern-reveal {
            background: rgba(255, 165, 0, 0.1);
            border: 2px solid #ffa500;
            color: #ffa500;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Match The Regex</h1>
        
        <div class="challenge-info">
            <h3>Challenge Description</h3>
            <p>Your mission is to find an input string that matches the hidden regex pattern. 
            The pattern is looking for a specific format - can you figure it out?</p>
        </div>
        
        <div class="regex-display" id="regexDisplay">
            Pattern: <span style="color: #ff4444;">HIDDEN</span> 🔒
        </div>
        
        <input type="text" id="userInput" placeholder="Enter your guess here..." />
        <br>
        <button onclick="submitInput()">🚀 Submit</button>
        <button class="hint-btn" onclick="showHint()">💡 Show Pattern</button>
        
        <div id="result" class="result"></div>
        <div id="patternReveal" class="pattern-reveal" style="display: none;"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
